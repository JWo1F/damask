name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  grammar:
    name: Tree-sitter grammar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli
      - name: Regenerate parser and run corpus tests
        working-directory: editors/zed/grammars/tree-sitter-damask
        run: |
          tree-sitter generate
          tree-sitter test

  publish-dry-run:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - uses: Swatinem/rust-cache@v2
      # Workspace-aware dry-run resolves the three crates against each other via
      # a temporary registry (cargo >= 1.90), so it works before anything is on
      # crates.io. The same command without --dry-run publishes them in order.
      - run: cargo publish --dry-run -p damask-template -p damask-macros -p damask
