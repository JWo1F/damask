id = "damask"
name = "Damask"
description = "Syntax highlighting and language server for Damask templates (.dmk)"
version = "0.1.0"
schema_version = 1
authors = ["Damask contributors"]
repository = "https://github.com/jwo1f/damask"

# Zed fetches a grammar by cloning a repository at a pinned revision, so the
# grammar is developed and released as its own repository rather than living
# here. Bump `rev` to adopt grammar changes.
[grammars.damask]
repository = "https://github.com/JWo1F/tree-sitter-damask"
rev = "db4e656afe1c8f8c2a7e96b31c33a4454442b354"

[language_servers.damask-lsp]
name = "Damask Language Server"
languages = ["Damask"]
