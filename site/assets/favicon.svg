  <rect width="24" height="24" rx="5" fill="#f7f4ee"/>
  <g fill="none" stroke="#a3372a" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round">
    <path id="p" d="M12 3.6C14.8 6.75 15.6 9.03 14.28 10.51 13.49 11.39 12.53 11.39 12 12 11.47 11.39 10.51 11.39 9.72 10.51 8.4 9.03 9.2 6.75 12 3.6Z"/>
    <use href="#p" transform="rotate(90 12 12)"/>
    <use href="#p" transform="rotate(180 12 12)"/>
    <use href="#p" transform="rotate(270 12 12)"/>
  </g>
</svg>
